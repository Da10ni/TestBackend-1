services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wallet']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      # Use the host network during build so RUN steps (prisma engine download
      # from binaries.prisma.sh) use the host's DNS. Works around flaky build-time
      # DNS on some Docker Desktop setups. Harmless where build DNS already works.
      network: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # NODE_ENV=development is used here so the /auth/dev-token testing helper
      # is available. Set to "production" to disable that back door.
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wallet?schema=public
      # Demo secrets — override for any real deployment.
      WEBHOOK_SECRET: dev_webhook_secret_change_me_min16
      JWT_SECRET: dev_jwt_secret_change_me_min16chars
      JWT_EXPIRES_IN: 60m
      WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS: 300
      SEED: 'true'
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
